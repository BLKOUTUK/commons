server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip text content
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/html
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Long-cache images and fonts
  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short-cache PDFs so updates land within the hour
  location ~* \.pdf$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # Hide nginx version
  server_tokens off;

  # Static serving with .html fallback for clean URLs
  location / {
    try_files $uri $uri/ $uri.html =404;
  }
}
